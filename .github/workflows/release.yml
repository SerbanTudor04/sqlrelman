name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write  # needed to create GitHub releases and upload assets

# ─────────────────────────────────────────────────────────────────────────────
# JDK configuration — change JDK_VERSION here to upgrade the bundled JRE.
# Adoptium API docs: https://api.adoptium.net/q/swagger-ui
# ─────────────────────────────────────────────────────────────────────────────
env:
  JDK_VERSION: '25'
  JDK_DIST:    'temurin'   # Eclipse Temurin (Adoptium) — free, GPL-compatible

jobs:

  # ──────────────────────────────────────────────────────────────
  # 1. Build the fat JAR once (Java bytecode is cross-platform)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build fat JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JDK_DIST }}
          java-version: ${{ env.JDK_VERSION }}
          cache: gradle

      - name: Build fat JAR
        run: ./gradlew fatJar --no-daemon

      - name: Upload fat JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: build/libs/sqlrelman-*.jar
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # 2. Package for Linux — two flavours:
  #    slim     → plain JAR + wrapper script (user needs Java)
  #    bundled  → JAR + Temurin JRE 25 included (zero deps)
  # ──────────────────────────────────────────────────────────────
  package-linux:
    name: Package — Linux
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: fat-jar
          path: dist/

      - name: Resolve version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Download Temurin JRE 25 for Linux x64 via the stable Adoptium REST API
      - name: Download Temurin JRE 25 (Linux x64)
        run: |
          curl -fL \
            "https://api.adoptium.net/v3/binary/latest/${{ env.JDK_VERSION }}/ga/linux/x64/jre/hotspot/normal/eclipse" \
            -o jre-linux.tar.gz
          mkdir -p jre-linux
          tar -xzf jre-linux.tar.gz -C jre-linux --strip-components=1
          echo "Bundled JRE: $(jre-linux/bin/java -version 2>&1 | head -1)"

      - name: Assemble Linux packages
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          JAR="$(ls dist/sqlrelman-*.jar)"

          # ── helpers ──────────────────────────────────────────────

          make_layout() {               # $1=pkg-name
            mkdir -p "pkg/$1/bin"
            cp "$JAR" "pkg/$1/sqlrelman.jar"
            cp README.md "pkg/$1/" 2>/dev/null || true
          }

          write_slim_wrapper() {        # $1=file
            cat > "$1" <<'WEOF'
          #!/usr/bin/env sh
          SCRIPT_DIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec java \
            --enable-native-access=ALL-UNNAMED \
            -Djline.log.level=OFF \
            -Dorg.jline.terminal.jna=false \
            -jar "$SCRIPT_DIR/sqlrelman.jar" "$@"
          WEOF
            chmod +x "$1"
          }

          write_bundled_wrapper() {     # $1=file
            cat > "$1" <<'WEOF'
          #!/usr/bin/env sh
          SCRIPT_DIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec "$SCRIPT_DIR/jre/bin/java" \
            --enable-native-access=ALL-UNNAMED \
            -Djline.log.level=OFF \
            -Dorg.jline.terminal.jna=false \
            -jar "$SCRIPT_DIR/sqlrelman.jar" "$@"
          WEOF
            chmod +x "$1"
          }

          write_install_uninstall() {   # $1=pkg-dir  $2=java-cmd-in-install-dir
            local JAVA_CMD="$2"
            cat > "pkg/$1/install.sh" <<IEOF
          #!/usr/bin/env sh
          set -e
          SRC="\$(cd "\$(dirname "\$0")" && pwd)"
          DEST="\${1:-\$HOME/.local}"
          mkdir -p "\$DEST/lib/sqlrelman" "\$DEST/bin"
          cp -r "\$SRC/"* "\$DEST/lib/sqlrelman/"
          printf '#!/usr/bin/env sh\n%s --enable-native-access=ALL-UNNAMED -Djline.log.level=OFF -Dorg.jline.terminal.jna=false -jar "%s/lib/sqlrelman/sqlrelman.jar" "\$@"\n' \
            "${JAVA_CMD}" "\$DEST" > "\$DEST/bin/sqlrelman"
          chmod +x "\$DEST/bin/sqlrelman"
          echo "Installed to \$DEST/bin/sqlrelman — make sure \$DEST/bin is on your PATH."
          IEOF
            chmod +x "pkg/$1/install.sh"

            cat > "pkg/$1/uninstall.sh" <<'UEOF'
          #!/usr/bin/env sh
          DEST="${1:-$HOME/.local}"
          rm -f  "$DEST/bin/sqlrelman"
          rm -rf "$DEST/lib/sqlrelman"
          echo "sqlrelman uninstalled."
          UEOF
            chmod +x "pkg/$1/uninstall.sh"
          }

          archive() {                   # $1=pkg-name
            (cd pkg && tar -czf "../$1.tar.gz" "$1" && zip -r "../$1.zip" "$1")
          }

          # ── Slim build ───────────────────────────────────────────
          SLIM="sqlrelman-${VER}-linux"
          make_layout "$SLIM"
          write_slim_wrapper "pkg/$SLIM/bin/sqlrelman"
          write_install_uninstall "$SLIM" "java"
          archive "$SLIM"

          # ── Bundled build ────────────────────────────────────────
          BUNDLED="sqlrelman-${VER}-linux-bundled-jre25"
          make_layout "$BUNDLED"
          cp -r jre-linux "pkg/$BUNDLED/jre"
          write_bundled_wrapper "pkg/$BUNDLED/bin/sqlrelman"
          write_install_uninstall "$BUNDLED" '"\$DEST/lib/sqlrelman/jre/bin/java"'
          archive "$BUNDLED"

      - name: Upload Linux slim archives
        uses: actions/upload-artifact@v4
        with:
          name: linux-slim
          path: |
            sqlrelman-*-linux.tar.gz
            sqlrelman-*-linux.zip

      - name: Upload Linux bundled archives
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundled
          path: |
            sqlrelman-*-linux-bundled-jre25.tar.gz
            sqlrelman-*-linux-bundled-jre25.zip

  # ──────────────────────────────────────────────────────────────
  # 3. Package for macOS (arm64 + x64 bundled, plus one slim)
  # ──────────────────────────────────────────────────────────────
  package-macos:
    name: Package — macOS
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: fat-jar
          path: dist/

      - name: Resolve version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # GitHub's macos-latest runners are Apple Silicon (arm64).
      # We build bundled packages for both arm64 and x64 so Intel users also
      # get a zero-dep download.
      - name: Download Temurin JRE 25 (macOS aarch64 — Apple Silicon)
        run: |
          curl -fL \
            "https://api.adoptium.net/v3/binary/latest/${{ env.JDK_VERSION }}/ga/mac/aarch64/jre/hotspot/normal/eclipse" \
            -o jre-macos-arm64.tar.gz
          mkdir -p jre-macos-arm64
          tar -xzf jre-macos-arm64.tar.gz -C jre-macos-arm64 --strip-components=1
          echo "arm64 JRE: $(jre-macos-arm64/Contents/Home/bin/java -version 2>&1 | head -1)"

      - name: Download Temurin JRE 25 (macOS x64 — Intel)
        run: |
          curl -fL \
            "https://api.adoptium.net/v3/binary/latest/${{ env.JDK_VERSION }}/ga/mac/x64/jre/hotspot/normal/eclipse" \
            -o jre-macos-x64.tar.gz
          mkdir -p jre-macos-x64
          tar -xzf jre-macos-x64.tar.gz -C jre-macos-x64 --strip-components=1

      - name: Assemble macOS packages
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          JAR="$(ls dist/sqlrelman-*.jar)"

          make_layout() {
            mkdir -p "pkg/$1/bin"
            cp "$JAR" "pkg/$1/sqlrelman.jar"
            cp README.md "pkg/$1/" 2>/dev/null || true
          }

          # Temurin macOS JRE is a .app bundle; java binary lives in Contents/Home/bin/
          write_wrapper() {   # $1=file  $2=java-binary-path
            local JAVA="$2"
            cat > "$1" <<WEOF
          #!/usr/bin/env sh
          SCRIPT_DIR="\$(cd "\$(dirname "\$0")/.." && pwd)"
          exec ${JAVA} \\
            --enable-native-access=ALL-UNNAMED \\
            -Djline.log.level=OFF \\
            -Dorg.jline.terminal.jna=false \\
            -jar "\$SCRIPT_DIR/sqlrelman.jar" "\$@"
          WEOF
            chmod +x "$1"
          }

          archive() {
            (cd pkg && tar -czf "../$1.tar.gz" "$1" && zip -r "../$1.zip" "$1")
          }

          # ── Slim ─────────────────────────────────────────────────
          SLIM="sqlrelman-${VER}-macos"
          make_layout "$SLIM"
          write_wrapper "pkg/$SLIM/bin/sqlrelman" "java"
          archive "$SLIM"

          # ── Bundled arm64 ─────────────────────────────────────────
          B_ARM="sqlrelman-${VER}-macos-arm64-bundled-jre25"
          make_layout "$B_ARM"
          cp -r jre-macos-arm64 "pkg/$B_ARM/jre"
          write_wrapper "pkg/$B_ARM/bin/sqlrelman" '"\$SCRIPT_DIR/jre/Contents/Home/bin/java"'
          archive "$B_ARM"

          # ── Bundled x64 ───────────────────────────────────────────
          B_X64="sqlrelman-${VER}-macos-x64-bundled-jre25"
          make_layout "$B_X64"
          cp -r jre-macos-x64 "pkg/$B_X64/jre"
          write_wrapper "pkg/$B_X64/bin/sqlrelman" '"\$SCRIPT_DIR/jre/Contents/Home/bin/java"'
          archive "$B_X64"

      - name: Upload macOS slim
        uses: actions/upload-artifact@v4
        with:
          name: macos-slim
          path: |
            sqlrelman-*-macos.tar.gz
            sqlrelman-*-macos.zip

      - name: Upload macOS bundled arm64
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundled-arm64
          path: |
            sqlrelman-*-macos-arm64-bundled-jre25.tar.gz
            sqlrelman-*-macos-arm64-bundled-jre25.zip

      - name: Upload macOS bundled x64
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundled-x64
          path: |
            sqlrelman-*-macos-x64-bundled-jre25.tar.gz
            sqlrelman-*-macos-x64-bundled-jre25.zip

  # ──────────────────────────────────────────────────────────────
  # 4. Package for Windows
  # ──────────────────────────────────────────────────────────────
  package-windows:
    name: Package — Windows
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: fat-jar
          path: dist/

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Temurin JRE 25 (Windows x64)
        shell: pwsh
        run: |
          $url = "https://api.adoptium.net/v3/binary/latest/${{ env.JDK_VERSION }}/ga/windows/x64/jre/hotspot/normal/eclipse"
          Invoke-WebRequest -Uri $url -OutFile jre-windows.zip
          Expand-Archive -Path jre-windows.zip -DestinationPath jre-raw -Force
          # Temurin zips contain a single versioned folder — flatten it
          $inner = (Get-ChildItem jre-raw)[0].FullName
          Move-Item $inner jre-windows
          Write-Host "Bundled JRE: $(& jre-windows\bin\java.exe -version 2>&1 | Select-Object -First 1)"

      - name: Assemble Windows packages
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $jar = (Get-Item dist\sqlrelman-*.jar).FullName

          function Make-Layout($pkg) {
            New-Item -ItemType Directory -Force -Path "pkg\$pkg\bin" | Out-Null
            Copy-Item $jar "pkg\$pkg\sqlrelman.jar"
            if (Test-Path README.md) { Copy-Item README.md "pkg\$pkg\" }
          }

          # .bat launcher — %SCRIPT_DIR% is the package root (one level above bin\)
          function Write-Bat($file, $java) {
            @"
          @echo off
          SET "SCRIPT_DIR=%~dp0.."
          "$java" --enable-native-access=ALL-UNNAMED ^
               -Djline.log.level=OFF ^
               -Dorg.jline.terminal.jna=false ^
               -jar "%SCRIPT_DIR%\sqlrelman.jar" %*
          "@ | Set-Content $file -Encoding ASCII
          }

          # PowerShell launcher
          function Write-Ps1($file, $java) {
            @"
          param([Parameter(ValueFromRemainingArguments)][string[]]`$passArgs)
          `$jar = Join-Path `$PSScriptRoot '..\sqlrelman.jar'
          & "$java" --enable-native-access=ALL-UNNAMED ``
                 -Djline.log.level=OFF ``
                 -Dorg.jline.terminal.jna=false ``
                 -jar `$jar @passArgs
          "@ | Set-Content $file -Encoding UTF8
          }

          # install.bat — copies the whole package to %USERPROFILE%\.local (or custom path)
          function Write-Install($pkg, $javaInInstall) {
            @"
          @echo off
          SETLOCAL
          SET "DEST=%USERPROFILE%\.local"
          IF NOT "%~1"=="" SET "DEST=%~1"

          IF NOT EXIST "%DEST%\lib\sqlrelman" MKDIR "%DEST%\lib\sqlrelman"
          IF NOT EXIST "%DEST%\bin"            MKDIR "%DEST%\bin"

          XCOPY /E /I /Y "%~dp0." "%DEST%\lib\sqlrelman\"

          (
            ECHO @echo off
            ECHO "$javaInInstall" --enable-native-access=ALL-UNNAMED -Djline.log.level=OFF -Dorg.jline.terminal.jna=false -jar "%DEST%\lib\sqlrelman\sqlrelman.jar" %%*
          ) > "%DEST%\bin\sqlrelman.bat"

          ECHO.
          ECHO Installed to %DEST%\bin\sqlrelman.bat
          ECHO Add %DEST%\bin to your PATH if it is not already there.
          ENDLOCAL
          "@ | Set-Content "pkg\$pkg\install.bat" -Encoding ASCII

            @'
          @echo off
          SETLOCAL
          SET "DEST=%USERPROFILE%\.local"
          IF NOT "%~1"=="" SET "DEST=%~1"
          DEL /Q "%DEST%\bin\sqlrelman.bat" 2>NUL
          RMDIR /S /Q "%DEST%\lib\sqlrelman" 2>NUL
          ECHO sqlrelman uninstalled from %DEST%
          ENDLOCAL
          '@ | Set-Content "pkg\$pkg\uninstall.bat" -Encoding ASCII
          }

          function Archive($pkg) {
            Compress-Archive -Path "pkg\$pkg" -DestinationPath "${pkg}.zip" -Force
          }

          # ── Slim build ───────────────────────────────────────────
          $slim = "sqlrelman-${ver}-windows"
          Make-Layout $slim
          Write-Bat "pkg\$slim\bin\sqlrelman.bat" "java"
          Write-Ps1 "pkg\$slim\bin\sqlrelman.ps1" "java"
          Write-Install $slim "java"
          Archive $slim

          # ── Bundled build ────────────────────────────────────────
          $bundled = "sqlrelman-${ver}-windows-bundled-jre25"
          Make-Layout $bundled
          Copy-Item -Recurse jre-windows "pkg\$bundled\jre"
          Write-Bat "pkg\$bundled\bin\sqlrelman.bat" "%SCRIPT_DIR%\jre\bin\java.exe"
          Write-Ps1 "pkg\$bundled\bin\sqlrelman.ps1" "`$PSScriptRoot\..\jre\bin\java.exe"
          Write-Install $bundled "%DEST%\lib\sqlrelman\jre\bin\java.exe"
          Archive $bundled

      - name: Upload Windows slim zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-slim
          path: sqlrelman-*-windows.zip

      - name: Upload Windows bundled zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundled
          path: sqlrelman-*-windows-bundled-jre25.zip

  # ──────────────────────────────────────────────────────────────
  # 5. Create the GitHub Release and attach all assets
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [package-linux, package-macos, package-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SQLRelMan ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## SQLRelMan ${{ github.ref_name }}

            Every platform ships in two flavours:

            | Flavour | Who is it for? |
            |---------|----------------|
            | **Slim** | You already have Java 17+ installed |
            | **Bundled JRE 25** | Zero dependencies — OpenJDK 25 (Temurin) included |

            ---

            ### 🐧 Linux (x64)

            | Download | Notes |
            |----------|-------|
            | `sqlrelman-*-linux.tar.gz` / `.zip` | Slim — requires Java |
            | `sqlrelman-*-linux-bundled-jre25.tar.gz` / `.zip` | Bundled JRE 25 |

            ```sh
            # Quick start (bundled — no Java needed)
            tar -xzf sqlrelman-*-linux-bundled-jre25.tar.gz
            ./sqlrelman-*/bin/sqlrelman

            # Install to ~/.local/bin
            cd sqlrelman-*/ && ./install.sh
            ```

            ---

            ### 🍎 macOS

            | Download | Notes |
            |----------|-------|
            | `sqlrelman-*-macos.tar.gz` / `.zip` | Slim — requires Java |
            | `sqlrelman-*-macos-arm64-bundled-jre25.tar.gz` / `.zip` | Bundled JRE 25 — Apple Silicon |
            | `sqlrelman-*-macos-x64-bundled-jre25.tar.gz` / `.zip` | Bundled JRE 25 — Intel |

            ```sh
            tar -xzf sqlrelman-*-macos-arm64-bundled-jre25.tar.gz
            ./sqlrelman-*/bin/sqlrelman
            # If macOS Gatekeeper blocks it:
            xattr -dr com.apple.quarantine sqlrelman-*/
            ```

            ---

            ### 🪟 Windows (x64)

            | Download | Notes |
            |----------|-------|
            | `sqlrelman-*-windows.zip` | Slim — requires Java |
            | `sqlrelman-*-windows-bundled-jre25.zip` | Bundled JRE 25 |

            Extract the zip, then run **`install.bat`** or launch **`bin\sqlrelman.bat`** directly.

            ---

            ### ☕ Raw fat JAR (any platform with Java 17+)

            `sqlrelman-*.jar` — `java -jar sqlrelman-*.jar`
          files: release-assets/*